# a summary about you
summary: "I began my career as a Full Stack Developer at IrraHub Co., Ltd., building and maintaining web applications while strengthening my foundation in software engineering and cross-platform development. I later transitioned into cybersecurity, completing the TryHackMe Junior Penetration Tester path, TCM Security’s Practical Ethical Hacking course, and earning the PJPT certification. I further advanced through the Hack The Box Penetration Tester path and continue to develop hands-on expertise through regular lab practice, with a strong focus on Active Directory security, privilege escalation, and red team methodologies as I prepare for the OSCP certification. I am passionate about offensive security and dedicated to continuous learning and growth in the field, with a commitment to sharing knowledge through technical writing and community engagement."

