# section information
section:
  name: Skills
  id: skills
  enable: true
  weight: 2
  showOnNavbar: false
  filter: true
  # Can optionally hide the title in sections
  # hideTitle: true

# filter buttons
buttons:
  - name: All
    filter: "all"
  - name: Offensive Security
    filter: "offensive"
  - name: Tools
    filter: "tools"
  - name: Programming
    filter: "programming"
  - name: Platforms
    filter: "platforms"

# Your Skills.
# Give a summary of you each skill in the summary section.

skills:
  # -------------------------
  # Offensive Security
  # -------------------------

  - name: Active Directory
    logo: /images/sections/skills/ad.png
    summary: "Experience with AD enumeration, privilege escalation, lateral movement, and common attack paths in lab environments."
    categories: ["offensive"]

  - name: Web Application Security
    logo: /images/sections/skills/owasp.png
    summary: "Familiar with OWASP Top 10 vulnerabilities, manual testing techniques, and exploitation fundamentals."
    categories: ["offensive"]

  - name: Penetration Testing
    logo: /images/sections/skills/pentest.png
    summary: "Hands-on experience through TryHackMe and Hack The Box using structured testing methodologies."
    categories: ["offensive"]

  # -------------------------
  # Security Tools
  # -------------------------

  - name: Burp Suite
    logo: /images/sections/skills/burpsuite.svg
    summary: "Web traffic interception, vulnerability testing, and manual exploitation."
    categories: ["tools"]

  - name: Nmap
    logo: /images/sections/skills/nmap.png
    summary: "Network scanning, service enumeration, and attack surface discovery."
    categories: ["tools"]

  - name: Metasploit
    logo: /images/sections/skills/metasploit.png
    summary: "Basic exploitation and post-exploitation techniques in controlled lab environments."
    categories: ["tools"]

  - name: Hashcat
    logo: /images/sections/skills/hc.png
    summary: "Password cracking and hash analysis for credential auditing in controlled lab environments."
    categories: ["tools"]

  - name: NetExec (CrackMapExec)
    logo: /images/sections/skills/nxc.svg
    summary: "Post-exploitation framework for Active Directory enumeration and lateral movement testing."
    categories: ["tools"]

  - name: BloodHound
    logo: /images/sections/skills/bloodhound.svg
    summary: "Active Directory attack path analysis and privilege escalation mapping."
    categories: ["tools"]

  - name: PowerView
    logo: /images/sections/skills/ps.png
    summary: "PowerShell-based Active Directory enumeration and reconnaissance."
    categories: ["tools"]

  - name: Certipy
    logo: /images/sections/skills/kali-tools.svg
    summary: "Active Directory Certificate Services (AD CS) enumeration and exploitation techniques."
    categories: ["tools"]

  - name: BloodyAD
    logo: /images/sections/skills/kali-tools.svg
    summary: "Active Directory object manipulation and privilege escalation in lab environments."
    categories: ["tools"]

  # -------------------------
  # Programming Background
  # -------------------------

  - name: Python
    logo: /images/sections/skills/python.png
    summary: "Used for scripting, automation, and security tooling."
    categories: ["programming"]

  - name: JavaScript
    logo: /images/sections/skills/js.png
    summary: "Experience in front-end and back-end web development."
    categories: ["programming"]

  - name: Java
    logo: /images/sections/skills/java.png
    summary: "Object-oriented programming and backend development fundamentals."
    categories: ["programming"]

  - name: C / C++
    logo: /images/sections/skills/c++.png
    summary: "Strong understanding of low-level programming concepts and memory management fundamentals."
    categories: ["programming"]

  - name: Flutter
    logo: /images/sections/skills/flutter.png
    summary: "Cross-platform mobile application development."
    categories: ["programming"]

  # -------------------------
  # Platforms
  # -------------------------

  - name: Linux
    logo: /images/sections/skills/linux.png
    summary: "Primary environment for development and security testing. Comfortable with CLI and shell scripting."
    categories: ["platforms"]

  - name: Windows
    logo: /images/sections/skills/windows.png
    summary: "Understanding of Windows architecture and Active Directory environments."
    categories: ["platforms"]

  - name: Git
    logo: /images/sections/skills/git.png
    summary: "Version control using GitHub and GitLab workflows."
    categories: ["platforms"]
